<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Connexion — BAR OPS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#080808;--surface:#0f0f0f;--text:#ede8e0;--text2:#a09890;--gold:#c4a46b;--gold2:#d4b47a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#000;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:var(--surface);border:1px solid #2a2a2a;border-radius:12px;padding:60px 48px;max-width:450px;width:100%;text-align:center}
h1{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;margin-bottom:12px}
.sub{color:var(--text2);font-size:12px;margin-bottom:40px;letter-spacing:.08em;text-transform:uppercase}
.msg{padding:12px;border-radius:5px;margin-bottom:20px;font-size:12px;display:none}
.msg.ok{background:rgba(106,170,136,.2);color:#6aaa88;display:block}
.msg.err{background:rgba(220,100,100,.2);color:#dc6464;display:block}
.btn{width:100%;padding:14px;border:1px solid #2a2a2a;background:none;color:var(--text);border-radius:5px;cursor:pointer;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;transition:.2s;margin-bottom:12px}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.gold{border-color:var(--gold);color:var(--gold)}
.btn.fill{background:var(--gold);color:#080808;border-color:var(--gold);margin-top:16px}
.btn.fill:hover{background:var(--gold2)}
.btn.fill:disabled{opacity:.5}
.toggle{font-size:12px;color:var(--text2);margin-top:20px}
.toggle button{background:none;border:none;color:var(--gold);cursor:pointer;text-decoration:underline;font-family:'Jost',sans-serif}
.back{margin-top:24px;display:flex;justify-content:center;gap:32px;align-items:center}
.back a{color:var(--text2);text-decoration:none;font-size:12px;transition:.2s}
.back a:hover{color:var(--gold)}
.footer-links{display:contents}
</style>
</head>
<body>
<div class="box">
  <h1>BAR OPS</h1>
  <p class="sub" id="sub">Connectez-vous</p>
  <div class="msg" id="msg"></div>

  <div id="view-login">
    <button class="btn fill" onclick="googleAuthLogin()">Se connecter avec Google</button>
    <div class="toggle">Pas de compte ? <button onclick="show('signup')">S'inscrire</button></div>
  </div>

  <div id="view-signup" style="display:none">
    <button class="btn fill" onclick="googleAuthSignup()">S'inscrire avec Google</button>
    <div class="toggle">Déjà inscrit ? <button onclick="show('login')">Se connecter</button></div>
  </div>

  <div class="back">
    <a href="index.html">← Retour</a>
    <a href="app.html?demo=1" style="font-size:11px;letter-spacing:.06em;text-decoration:underline;text-underline-offset:3px">Visualiser sans se connecter →</a>
  </div>
</div>

<script>
const SUPA_URL='https://hrpcdtkhnewigewomcvv.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhycGNkdGtobmV3aWdld29tY3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTE2ODEsImV4cCI6MjA5MjIyNzY4MX0.VExeqSOA8M_kR4Uw8GXBRaqbctQjpZ8DgOn_-n-HJ5c';
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY,{
  auth:{detectSessionInUrl:true,persistSession:true}
});

function show(v){
  document.getElementById('view-signup').style.display=v==='signup'?'block':'none';
  document.getElementById('view-login').style.display=v==='login'?'block':'none';
  document.getElementById('sub').textContent=v==='signup'?'Créez votre compte':'Connectez-vous';
  document.getElementById('msg').className='msg';
}

function msg(t,type){
  const el=document.getElementById('msg');
  el.textContent=t;
  el.className='msg '+(type==='ok'?'ok':'err');
}

async function googleAuthLogin(){
  await sb.auth.signOut();
  const{error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:'https://bar-opsv2public.netlify.app/auth.html?action=login'}
  });
  if(error)msg(error.message,'err');
}

async function googleAuthSignup(){
  await sb.auth.signOut();
  const{error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:'https://bar-opsv2public.netlify.app/auth.html?action=signup'}
  });
  if(error)msg(error.message,'err');
}


async function redirect(userId){
  try{
    const{data}=await sb.from('subscriptions').select('status,expires_at').eq('user_id',userId).single();
    if(data?.status==='active'&&new Date(data.expires_at)>new Date()){
      window.location.href='app.html';
      return;
    }
  }catch(e){}
  window.location.href='paying.html';
}

// Only redirect if coming from Google OAuth (hash contains token)
(async()=>{
  const fullHash=window.location.hash.substring(1);
  const action=new URLSearchParams(window.location.search).get('action');
  
  if(!fullHash.includes('access_token'))return;
  
  // Set timeout fallback for private mode
  const fallbackTimeout=setTimeout(()=>{
    if(action==='signup'){
      window.location.href='paying.html';
    }
  },2000);
  
  sb.auth.onAuthStateChange(async(e,s)=>{
    if(e==='SIGNED_IN'&&s){
      clearTimeout(fallbackTimeout);
      if(action==='signup'){
        try{
          const{data:existing}=await sb.from('subscriptions').select('id').eq('user_id',s.user.id).single();
          if(!existing){
            await sb.from('subscriptions').insert([{
              user_id:s.user.id,
              status:'trial',
              plan:'trial',
              created_at:new Date().toISOString(),
              expires_at:new Date(Date.now()+14*24*60*60*1000).toISOString()
            }]);
          }
        }catch(e){}
        window.location.href='paying.html';
      }else{
        await redirect(s.user.id);
      }
    }
  });
})();
</script>
</body>
</html>
